name: edgerx
# Keep the same region as the existing app to preserve the DefaultIngress/SSL.
region: blr

services:
  # ─────────── Laravel API ───────────
  - name: backend
    instance_count: 1
    instance_size_slug: basic-xs
    http_port: 8080
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    build_command: ""
    github:
      repo: eyadrasmi78/EdgeRX2.0
      branch: main
      deploy_on_push: true
    routes:
      - path: /api
      - path: /sanctum
      - path: /broadcasting
      - path: /up
      - path: /storage
    health_check:
      http_path: /api/healthz
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 5
    envs:
      - { key: APP_NAME,                    value: "EdgeRX",                            scope: RUN_AND_BUILD_TIME }
      - { key: APP_ENV,                     value: "production",                        scope: RUN_AND_BUILD_TIME }
      - { key: APP_DEBUG,                   value: "false",                             scope: RUN_TIME }
      - { key: APP_TIMEZONE,                value: "UTC",                               scope: RUN_AND_BUILD_TIME }
      - { key: APP_URL,                     value: "https://edgerx.app",                scope: RUN_TIME }
      - { key: FRONTEND_URL,                value: "https://edgerx.app",                scope: RUN_TIME }
      - { key: APP_KEY,                     scope: RUN_AND_BUILD_TIME, type: SECRET }
      # ── DB (managed Postgres ${db.*}) ──
      - { key: DB_CONNECTION,               value: "pgsql",                             scope: RUN_AND_BUILD_TIME }
      - { key: DB_HOST,                     value: "${db.HOSTNAME}",                    scope: RUN_AND_BUILD_TIME }
      - { key: DB_PORT,                     value: "${db.PORT}",                        scope: RUN_AND_BUILD_TIME }
      - { key: DB_DATABASE,                 value: "${db.DATABASE}",                    scope: RUN_AND_BUILD_TIME }
      - { key: DB_USERNAME,                 value: "${db.USERNAME}",                    scope: RUN_AND_BUILD_TIME }
      - { key: DB_PASSWORD,                 value: "${db.PASSWORD}",                    scope: RUN_AND_BUILD_TIME, type: SECRET }
      # ── Sessions ──
      - { key: SESSION_DRIVER,              value: "database",                          scope: RUN_TIME }
      - { key: SESSION_LIFETIME,            value: "120",                               scope: RUN_TIME }
      - { key: SESSION_SECURE_COOKIE,       value: "true",                              scope: RUN_TIME }
      - { key: SESSION_SAME_SITE,           value: "lax",                               scope: RUN_TIME }
      - { key: SESSION_DOMAIN,              value: ".edgerx.app",                       scope: RUN_TIME }
      # ── Sanctum SPA ──
      - { key: SANCTUM_STATEFUL_DOMAINS,    value: "edgerx.app,www.edgerx.app",         scope: RUN_TIME }
      # ── Cache / Queue (DB-backed for simplicity, no Redis on App Platform) ──
      - { key: CACHE_STORE,                 value: "database",                          scope: RUN_TIME }
      - { key: QUEUE_CONNECTION,            value: "database",                          scope: RUN_TIME }
      # ── CORS ──
      - { key: CORS_ALLOWED_ORIGINS,        value: "https://edgerx.app,https://www.edgerx.app", scope: RUN_TIME }
      # ── Mail (SendGrid SMTP) ──
      - { key: MAIL_MAILER,                 value: "smtp",                              scope: RUN_TIME }
      - { key: MAIL_HOST,                   value: "smtp.sendgrid.net",                 scope: RUN_TIME }
      - { key: MAIL_PORT,                   value: "587",                               scope: RUN_TIME }
      - { key: MAIL_USERNAME,               value: "apikey",                            scope: RUN_TIME }
      - { key: MAIL_PASSWORD,               scope: RUN_TIME, type: SECRET }
      - { key: MAIL_ENCRYPTION,             value: "tls",                               scope: RUN_TIME }
      - { key: MAIL_FROM_ADDRESS,           value: "noreply@em.edgerx.app",             scope: RUN_TIME }
      - { key: MAIL_FROM_NAME,              value: "EdgeRX",                            scope: RUN_TIME }
      # ── Files: DO Spaces ──
      - { key: FILESYSTEM_DISK,             value: "spaces",                            scope: RUN_TIME }
      - { key: DO_SPACES_KEY,               scope: RUN_TIME, type: SECRET }
      - { key: DO_SPACES_SECRET,            scope: RUN_TIME, type: SECRET }
      - { key: DO_SPACES_REGION,            value: "fra1",                              scope: RUN_TIME }
      - { key: DO_SPACES_BUCKET,            value: "edgerx-uploads",                    scope: RUN_TIME }
      - { key: DO_SPACES_ENDPOINT,          value: "https://fra1.digitaloceanspaces.com", scope: RUN_TIME }
      # ── Broadcasting ──
      - { key: BROADCAST_CONNECTION,        value: "log",                               scope: RUN_TIME }
      # ── AI ──
      - { key: GEMINI_API_KEY,              scope: RUN_TIME, type: SECRET }
      - { key: GEMINI_MODEL,                value: "gemini-1.5-flash",                  scope: RUN_TIME }
      # ── Logging ──
      - { key: LOG_CHANNEL,                 value: "stderr",                            scope: RUN_TIME }
      - { key: LOG_LEVEL,                   value: "info",                              scope: RUN_TIME }

  # ─────────── React SPA (static) ───────────
static_sites:
  - name: frontend
    source_dir: frontend
    github:
      repo: eyadrasmi78/EdgeRX2.0
      branch: main
      deploy_on_push: true
    output_dir: dist
    build_command: npm install && npm run build
    routes:
      - path: /
    catchall_document: index.html

# ─────────── Background queue worker ───────────
workers:
  - name: queue
    instance_count: 1
    instance_size_slug: basic-xxs
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    github:
      repo: eyadrasmi78/EdgeRX2.0
      branch: main
      deploy_on_push: true
    run_command: php artisan queue:work --tries=3 --max-time=3600 --sleep=2
    envs:
      - { key: APP_NAME,                    value: "EdgeRX",                            scope: RUN_AND_BUILD_TIME }
      - { key: APP_ENV,                     value: "production",                        scope: RUN_TIME }
      - { key: APP_KEY,                     scope: RUN_AND_BUILD_TIME, type: SECRET }
      - { key: DB_CONNECTION,               value: "pgsql",                             scope: RUN_TIME }
      - { key: DB_HOST,                     value: "${db.HOSTNAME}",                    scope: RUN_TIME }
      - { key: DB_PORT,                     value: "${db.PORT}",                        scope: RUN_TIME }
      - { key: DB_DATABASE,                 value: "${db.DATABASE}",                    scope: RUN_TIME }
      - { key: DB_USERNAME,                 value: "${db.USERNAME}",                    scope: RUN_TIME }
      - { key: DB_PASSWORD,                 value: "${db.PASSWORD}",                    scope: RUN_TIME, type: SECRET }
      - { key: QUEUE_CONNECTION,            value: "database",                          scope: RUN_TIME }
      - { key: CACHE_STORE,                 value: "database",                          scope: RUN_TIME }
      - { key: MAIL_MAILER,                 value: "smtp",                              scope: RUN_TIME }
      - { key: MAIL_HOST,                   value: "smtp.sendgrid.net",                 scope: RUN_TIME }
      - { key: MAIL_PORT,                   value: "587",                               scope: RUN_TIME }
      - { key: MAIL_USERNAME,               value: "apikey",                            scope: RUN_TIME }
      - { key: MAIL_PASSWORD,               scope: RUN_TIME, type: SECRET }
      - { key: MAIL_ENCRYPTION,             value: "tls",                               scope: RUN_TIME }
      - { key: MAIL_FROM_ADDRESS,           value: "noreply@em.edgerx.app",             scope: RUN_TIME }
      - { key: MAIL_FROM_NAME,              value: "EdgeRX",                            scope: RUN_TIME }
      - { key: LOG_CHANNEL,                 value: "stderr",                            scope: RUN_TIME }

# ─────────── Managed Postgres ───────────
databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1
    production: false  # smallest tier for the demo

# ─────────── Custom domain ───────────
domains:
  - domain: edgerx.app
    type: PRIMARY
    zone: edgerx.app
  - domain: www.edgerx.app
    type: ALIAS
    zone: edgerx.app
