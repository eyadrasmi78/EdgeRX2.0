# nginx config for EdgeRX Laravel backend running behind DO App Platform.
# Listens on 8080 (the port DO App Platform routes to).
# Static files served directly; everything else proxied to php-fpm via Unix socket.

user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 25m; # base64 PDF uploads can be ~10MB

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /dev/stdout main;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Trust DO App Platform's reverse proxy so $remote_addr reflects the real
    # client. Laravel's TrustProxies middleware also expects X-Forwarded-* set.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    server {
        listen 8080 default_server;
        server_name _;
        root /var/www/html/public;
        index index.php;
        charset utf-8;

        # Health probe — bypass PHP entirely
        location = /up { access_log off; return 200 "OK\n"; add_header Content-Type text/plain; }

        # Static asset caching
        location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            access_log off;
            try_files $uri =404;
        }

        # All other requests → public/index.php → Laravel router
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass unix:/run/php-fpm.sock;
            fastcgi_index index.php;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT   $realpath_root;
            fastcgi_read_timeout 60;
        }

        # Hide hidden files (.env, .htaccess, etc.)
        location ~ /\.(?!well-known).* { deny all; access_log off; log_not_found off; }
    }
}
