; php-fpm pool tuning for EdgeRX. Listens on a Unix socket consumed by nginx.
; Sized for DO App Platform basic-xs (1 vCPU, 1GB RAM).

[edgerx]
user = www-data
group = www-data
listen = /run/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 12
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 500

; Slow log: anything > 5s of PHP execution gets logged for investigation.
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s

; Timeouts
request_terminate_timeout = 60

; Errors → stderr so DO logs pick them up
catch_workers_output = yes
decorate_workers_output = no
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
